name: Loom Host Attestation Evidence

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to attest
        required: true
        type: string
      head_sha:
        description: Exact current pull request head SHA
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: loom-host-attestation-${{ inputs.pr_number }}-${{ inputs.head_sha }}
  cancel-in-progress: false

jobs:
  attest:
    name: Validate current PR head
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate inputs against GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          EXPECTED_HEAD: ${{ inputs.head_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [[ ! "$PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "pr_number must be a positive integer" >&2
            exit 1
          fi
          if [[ ! "$EXPECTED_HEAD" =~ ^[0-9a-f]{40}$ ]]; then
            echo "head_sha must be a lowercase 40-character commit SHA" >&2
            exit 1
          fi

          pr_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          actual_state="$(jq -r '.state' <<<"$pr_json")"
          actual_draft="$(jq -r '.draft' <<<"$pr_json")"
          actual_base="$(jq -r '.base.ref' <<<"$pr_json")"
          actual_head="$(jq -r '.head.sha' <<<"$pr_json")"

          if [[ "$actual_state" != "open" || "$actual_draft" != "false" ]]; then
            echo "pull request must be open and non-draft" >&2
            exit 1
          fi
          if [[ "$actual_base" != "$DEFAULT_BRANCH" ]]; then
            echo "pull request base must be the repository default branch" >&2
            exit 1
          fi
          if [[ "$actual_head" != "$EXPECTED_HEAD" ]]; then
            echo "head_sha is stale or does not belong to the pull request" >&2
            exit 1
          fi

      - name: Write attestation evidence
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
        run: |
          mkdir -p host-attestation
          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg pr_number "$PR_NUMBER" \
            --arg head_sha "$HEAD_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg actor "$GITHUB_TRIGGERING_ACTOR" \
            '{
              schema_version: "skills-manager-host-attestation/v1",
              repository: $repository,
              pr_number: ($pr_number | tonumber),
              head_sha: $head_sha,
              run_id: ($run_id | tonumber),
              run_attempt: ($run_attempt | tonumber),
              triggering_actor: $actor
            }' > host-attestation/evidence.json

      - name: Upload host attestation
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: loom-host-attestation-${{ inputs.pr_number }}
          path: host-attestation/evidence.json
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
