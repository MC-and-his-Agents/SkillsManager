name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    env:
      APP_IDENTITY: ${{ vars.APP_IDENTITY }}
      APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
      SPARKLE_PUBLIC_KEY: ${{ vars.SPARKLE_PUBLIC_KEY }}
      SPARKLE_FEED_URL: ${{ vars.SPARKLE_FEED_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Validate release version
        run: |
          set -euo pipefail
          source version.env
          if [[ "$GITHUB_REF_NAME" != "v${MARKETING_VERSION}" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match version.env (${MARKETING_VERSION})." >&2
            exit 1
          fi
          echo "MARKETING_VERSION=${MARKETING_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_ZIP=SkillsManager-${MARKETING_VERSION}.zip" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/release.keychain-db"
          keychain_password=$(openssl rand -hex 24)

          printf '%s' "$MACOS_CERTIFICATE_P12" | openssl base64 -d -A -out "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

      - name: Restore release keys
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          app_store_key="$RUNNER_TEMP/AuthKey.p8"
          sparkle_key="$RUNNER_TEMP/sparkle-private-key.txt"
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$app_store_key"
          printf '%s' "$SPARKLE_PRIVATE_KEY" > "$sparkle_key"
          chmod 600 "$app_store_key" "$sparkle_key"
          echo "APP_STORE_CONNECT_API_KEY_P8=${app_store_key}" >> "$GITHUB_ENV"
          echo "SPARKLE_PRIVATE_KEY_FILE=${sparkle_key}" >> "$GITHUB_ENV"

      - name: Sign and notarize
        run: ./Scripts/sign-and-notarize.sh

      - name: Generate Sparkle appcast
        run: |
          set -euo pipefail
          SPARKLE_RELEASE_VERSION="$MARKETING_VERSION" \
            ./Scripts/make_appcast.sh "$RELEASE_ZIP" "$SPARKLE_FEED_URL"
          grep -Fq 'sparkle:edSignature=' appcast.xml
          grep -Fq "/releases/download/v${MARKETING_VERSION}/${RELEASE_ZIP}" appcast.xml

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$RELEASE_ZIP" appcast.xml --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$RELEASE_ZIP" appcast.xml \
              --verify-tag \
              --title "Skills Manager ${MARKETING_VERSION}" \
              --generate-notes
          fi

      - name: Remove release credentials
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/release.keychain-db" 2>/dev/null || true
          rm -f "$RUNNER_TEMP/developer-id.p12" \
            "$RUNNER_TEMP/AuthKey.p8" \
            "$RUNNER_TEMP/sparkle-private-key.txt"
